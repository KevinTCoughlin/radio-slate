name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install 1.96 --profile minimal --component rustfmt clippy

      - name: Select Rust 1.96
        run: rustup default 1.96

      - name: Install Linux system packages
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libappindicator3-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Validate package
        run: cargo package --locked
